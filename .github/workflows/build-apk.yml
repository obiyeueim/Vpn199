name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "PingPilotVPN/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "PingPilotVPN/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: PingPilotVPN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Run unit tests
        run: gradle --no-daemon :app:testDebugUnitTest

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PingPilotVPN-debug-apk
          path: PingPilotVPN/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
